services:
  vizier-mcp:
    build: .
    image: ghcr.io/stranma/vizier:latest
    container_name: vizier-mcp
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - vizier-data:/data/vizier
    env_file:
      - .env
    environment:
      - VIZIER_ROOT=/data/vizier
      - HEALTH_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      vizier-mcp:
        condition: service_healthy
    volumes:
      - ./openclaw/workspaces:/home/node/.openclaw/workspace
      - openclaw-data:/home/node/.openclaw/agents
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  vizier-data:
  openclaw-data:
