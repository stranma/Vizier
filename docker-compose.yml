services:
  vizier-mcp:
    build: .
    image: ghcr.io/stranma/vizier:latest
    ports:
      - "8080:8080"
    volumes:
      - vizier-data:/data/vizier
    env_file:
      - path: .env
        required: false
    environment:
      - VIZIER_ROOT=/data/vizier
      - HEALTH_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  vizier-data:
