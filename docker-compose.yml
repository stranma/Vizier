services:
  vizier-mcp:
    build: .
    image: ghcr.io/stranma/vizier:latest
    container_name: vizier-mcp
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - vizier-data:/data/vizier
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - VIZIER_ROOT=/data/vizier
      - HEALTH_PORT=8080
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  hermes:
    build: hermes/
    container_name: hermes-vizier
    restart: unless-stopped
    depends_on:
      vizier-mcp:
        condition: service_healthy
    volumes:
      - hermes-data:/home/hermes/.hermes/sessions
      - hermes-memories:/home/hermes/.hermes/memories
      # Mount subscription auth credentials from host (created by `hermes login`).
      # Comment out if using API key auth instead.
      - ${HERMES_AUTH_JSON:-./hermes/auth.json}:/home/hermes/.hermes/auth.json:ro
    env_file:
      - .env
    environment:
      - HERMES_HOME=/home/hermes/.hermes
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  vizier-data:
  hermes-data:
  hermes-memories:
