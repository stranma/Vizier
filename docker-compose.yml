services:
  vizier-daemon:
    image: ghcr.io/stranma/vizier:latest
    build: .
    container_name: vizier-daemon
    restart: always
    env_file:
      - /opt/vizier/config/.env
    environment:
      - VIZIER_ROOT=/opt/vizier
    volumes:
      - /opt/vizier/config/config.yaml:/opt/vizier/config.yaml:ro
      - /opt/vizier/config/projects.yaml:/opt/vizier/projects.yaml
      - vizier-workspaces:/opt/vizier/workspaces
      - vizier-reports:/opt/vizier/reports
      - vizier-ea:/opt/vizier/ea
      - vizier-security:/opt/vizier/security
      - vizier-logs:/opt/vizier/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  langfuse:
    image: langfuse/langfuse:2
    container_name: vizier-langfuse
    restart: always
    profiles:
      - observability
    env_file:
      - /opt/vizier/config/.env
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme}
      - SALT=${LANGFUSE_SALT:-changeme}
    ports:
      - "3000:3000"
    depends_on:
      langfuse-db:
        condition: service_healthy

  langfuse-db:
    image: postgres:15-alpine
    container_name: vizier-langfuse-db
    restart: always
    profiles:
      - observability
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vizier-workspaces:
  vizier-reports:
  vizier-ea:
  vizier-security:
  vizier-logs:
  langfuse-pgdata:
