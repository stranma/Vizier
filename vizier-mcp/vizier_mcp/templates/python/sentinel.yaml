write_set:
  - "src/**/*.py"
  - "tests/**/*.py"
  - "*.md"
  - "*.toml"
  - "*.cfg"
  - "*.txt"
  - ".github/**"

command_allowlist:
  - "uv run pytest"
  - "uv run ruff"
  - "uv run pyright"
  - "uv sync"
  - "git status"
  - "git diff"
  - "git log"
  - "git add"
  - "git commit"

command_denylist:
  - "rm -rf /"

role_permissions:
  worker:
    can_write: true
    can_bash: true
    can_read: true
  quality_gate:
    can_bash: true
    can_read: true
  scout:
    can_read: true
    can_web_fetch: true
