# Example .vizier/config.yaml for a target project
# Place this file in the root of your managed project

plugin: software

# Architect decomposition hints
architect:
  patterns:
    - feature
    - bugfix
    - refactor

# Quality gate criteria
quality_gate:
  criteria:
    - tests_pass
    - lint_clean
    - type_check
    - no_debug_artifacts

# Worker constraints
worker:
  max_file_changes: 20
  allowed_tools:
    - file_read
    - file_write
    - bash
    - git
