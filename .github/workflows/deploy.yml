name: Deploy

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stranma/vizier

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Azure Login
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: vizier
          secrets: "anthropic-api-key, telegram-bot-token, telegram-sultan-chat-id"
        id: keyvault

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,openclaw/config/,openclaw/workspaces/,scripts/"
          target: /opt/vizier/

      - name: Write secrets to server .env
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ANTHROPIC_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_SULTAN_CHAT_ID
          script: |
            cd /opt/vizier
            touch .env
            for key in ANTHROPIC_API_KEY TELEGRAM_BOT_TOKEN TELEGRAM_SULTAN_CHAT_ID; do
              val=$(eval echo "\$$key")
              if [ -n "$val" ]; then
                grep -v "^${key}=" .env > .env.tmp || true
                echo "${key}=${val}" >> .env.tmp
                mv .env.tmp .env
                echo "  $key: written"
              fi
            done
            echo "Secrets written to .env"
        env:
          ANTHROPIC_API_KEY: ${{ steps.keyvault.outputs.anthropic-api-key }}
          TELEGRAM_BOT_TOKEN: ${{ steps.keyvault.outputs.telegram-bot-token }}
          TELEGRAM_SULTAN_CHAT_ID: ${{ steps.keyvault.outputs.telegram-sultan-chat-id }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker pull ghcr.io/openclaw/openclaw:latest || echo "OpenClaw image pull failed (may not exist yet)"
            cd /opt/vizier
            echo "Verifying config files..."
            ls -la openclaw/config/openclaw.json openclaw/config/agents.json || { echo "ERROR: OpenClaw config files missing after SCP"; exit 1; }
            ls -d openclaw/workspaces/vizier openclaw/workspaces/worker-template || { echo "ERROR: OpenClaw workspace dirs missing after SCP"; exit 1; }
            docker compose up -d --force-recreate 2>&1 || { echo "docker compose up failed"; docker compose logs; exit 1; }
            sleep 3
            echo "Container status:"
            docker compose ps

            echo "--- Vizier MCP health check ---"
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/health >/dev/null; then
                echo "Vizier MCP health check passed"
                curl -s http://localhost:8080/health | python3 -m json.tool
                echo ""
                echo "Readiness status (informational):"
                curl -s http://localhost:8080/readiness | python3 -m json.tool || true
                break
              fi
              echo "Waiting for vizier-mcp health (attempt $i/30)..."
              sleep 2
              if [ "$i" -eq 30 ]; then
                echo "Vizier MCP health check failed after 60 seconds"
                docker compose logs vizier-mcp --tail=50
                exit 1
              fi
            done

            echo ""
            echo "--- OpenClaw health check ---"
            for i in $(seq 1 15); do
              if curl -sf http://localhost:18789/ >/dev/null; then
                echo "OpenClaw health check passed"
                exit 0
              fi
              echo "Waiting for OpenClaw (attempt $i/15)..."
              sleep 2
            done
            echo "OpenClaw health check failed (informational -- may need TELEGRAM_BOT_TOKEN)"
            docker compose logs openclaw --tail=20 || true
            exit 0
