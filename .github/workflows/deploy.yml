name: Deploy

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stranma/vizier

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push vizier-mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Build and push hermes-vizier image
        uses: docker/build-push-action@v6
        with:
          context: ./hermes
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-hermes:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-hermes:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout (for docker-compose.yml and config)
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        id: infisical
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: "vizier"
          env-slug: "prod"

      - name: Clean deployment dirs before SCP
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker run --rm -v /opt/vizier:/mnt busybox:1.37 sh -c "rm -rf /mnt/hermes/ /mnt/scripts/ /mnt/vizier-mcp/scripts/"

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,hermes/,scripts/,vizier-mcp/scripts/"
          target: /opt/vizier/
          overwrite: true

      - name: Write secrets to server .env
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ANTHROPIC_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USERS,GITHUB_TOKEN
          script: |
            cd /opt/vizier
            touch .env
            for key in ANTHROPIC_API_KEY TELEGRAM_BOT_TOKEN TELEGRAM_ALLOWED_USERS GITHUB_TOKEN; do
              val="${!key}"
              if [ -n "$val" ]; then
                grep -v "^${key}=" .env > .env.tmp || true
                echo "${key}=${val}" >> .env.tmp
                mv .env.tmp .env
                echo "  $key: written"
              fi
            done
            echo "Secrets written to .env"
        env:
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ env.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ env.TELEGRAM_ALLOWED_USERS }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: vizier
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-hermes:${{ github.sha }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-hermes:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-hermes:latest
            cd /opt/vizier
            docker compose up -d --force-recreate 2>&1 || { echo "docker compose up failed"; docker compose logs; exit 1; }
            sleep 3
            echo "Container status:"
            docker compose ps

            echo "========================================"
            echo "  POST-DEPLOY HEALTH CHECKS"
            echo "========================================"
            DEPLOY_OK=true

            echo ""
            echo "--- [1/4] Vizier MCP liveness (/health) ---"
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/health >/dev/null; then
                echo "PASS: vizier-mcp is alive"
                curl -s http://localhost:8080/health | python3 -m json.tool
                break
              fi
              echo "  waiting (attempt $i/30)..."
              sleep 2
              if [ "$i" -eq 30 ]; then
                echo "FAIL: vizier-mcp did not become healthy in 60s"
                docker compose logs vizier-mcp --tail=50
                exit 1
              fi
            done

            echo ""
            echo "--- [2/4] Vizier MCP readiness (/readiness) ---"
            READINESS=$(curl -s http://localhost:8080/readiness)
            echo "$READINESS" | python3 -m json.tool
            if echo "$READINESS" | python3 -c "import sys,json; r=json.load(sys.stdin); sys.exit(0 if r.get('ready') else 1)"; then
              echo "PASS: all readiness checks passed"
            else
              echo "FAIL: readiness check failed"
              DEPLOY_OK=false
            fi

            echo ""
            echo "--- [3/4] Vizier MCP HTTP transport ---"
            if docker compose exec -T vizier-mcp curl -sf http://localhost:8001/mcp >/dev/null 2>&1; then
              echo "PASS: MCP HTTP endpoint responding on port 8001"
            else
              echo "WARN: MCP HTTP endpoint not responding (may need different path)"
              docker compose logs vizier-mcp --tail=10 | grep -i "transport\|8001\|http" || true
            fi

            echo ""
            echo "--- [4/4] Hermes container running ---"
            HERMES_STATE=$(docker compose ps hermes --format '{{.State}}' 2>/dev/null || echo "missing")
            if [ "$HERMES_STATE" = "running" ]; then
              echo "PASS: hermes-vizier container is running"
            else
              echo "FAIL: hermes-vizier container state: $HERMES_STATE"
              docker compose logs hermes --tail=30
              DEPLOY_OK=false
            fi

            echo ""
            echo "========================================"
            if [ "$DEPLOY_OK" = "true" ]; then
              echo "  DEPLOY RESULT: ALL CHECKS PASSED"
            else
              echo "  DEPLOY RESULT: SOME CHECKS FAILED"
              echo ""
              echo "  Container status:"
              docker compose ps
              echo ""
              echo "  Full hermes logs:"
              docker compose logs hermes --tail=50
              exit 1
            fi
            echo "========================================"
