name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - vizier-mcp

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.5.0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine package path
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PKG="${{ inputs.package }}"
          else
            # Extract package from release tag (e.g., vizier-mcp-v0.6.0 -> vizier-mcp)
            PKG=$(echo "${{ github.ref_name }}" | sed 's/-v.*//')
          fi

          case "$PKG" in
            vizier-mcp)  echo "path=vizier-mcp" >> "$GITHUB_OUTPUT" ;;
            *)           echo "Unknown package: $PKG"; exit 1 ;;
          esac

      - name: Build package
        run: uv build --directory ${{ steps.pkg.outputs.path }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
