name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - core
          - daemon
          - cli
          - plugin-software
          - plugin-documents

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.5.0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine package path
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PKG="${{ inputs.package }}"
          else
            # Extract package from release tag (e.g., core-v0.1.0 -> core)
            PKG=$(echo "${{ github.ref_name }}" | sed 's/-v.*//')
          fi

          case "$PKG" in
            core)              echo "path=libs/core" >> "$GITHUB_OUTPUT" ;;
            daemon)            echo "path=apps/daemon" >> "$GITHUB_OUTPUT" ;;
            cli)               echo "path=apps/cli" >> "$GITHUB_OUTPUT" ;;
            plugin-software)   echo "path=plugins/software" >> "$GITHUB_OUTPUT" ;;
            plugin-documents)  echo "path=plugins/documents" >> "$GITHUB_OUTPUT" ;;
            *)                 echo "Unknown package: $PKG"; exit 1 ;;
          esac

      - name: Build package
        run: uv build --package ${{ steps.pkg.outputs.path }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
